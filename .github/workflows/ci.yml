name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-tests:
    name: Backend pytest + coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install backend (dev extras only — keep ML deps out of CI for speed)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          pip install pytest-cov
      - name: Run pytest
        run: |
          python -m pytest tests/ -x -q --cov=kb --cov-report=term-missing
        env:
          KB_LLM_PROVIDER: hermes  # tests mock the provider layer; no real CLI/SDK needed

  frontend-typecheck:
    name: Frontend tsc + ESLint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: TypeScript type-check
        run: npx tsc --noEmit
      - name: ESLint
        run: npx eslint src/

  frontend-e2e:
    name: Frontend Playwright (chromium)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build Next.js
        run: npm run build
      - name: Run e2e tests
        run: npm run test:e2e
